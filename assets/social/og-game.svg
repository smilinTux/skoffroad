<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0a09"/>
      <stop offset="55%" stop-color="#1a1411"/>
      <stop offset="100%" stop-color="#2a1810"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.28" r="0.55">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="terrain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d2817"/>
      <stop offset="100%" stop-color="#1a0f08"/>
    </linearGradient>
    <linearGradient id="terrain2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5c3a1f"/>
      <stop offset="100%" stop-color="#2a1810"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Stylized terrain silhouette (back layer) -->
  <path d="M 0 460 Q 150 400 280 430 T 540 410 T 820 440 T 1080 405 T 1200 425 L 1200 630 L 0 630 Z"
        fill="url(#terrain2)" opacity="0.85"/>
  <!-- Front terrain layer -->
  <path d="M 0 510 Q 100 470 230 490 Q 380 515 520 480 Q 680 445 850 495 Q 1000 540 1200 490 L 1200 630 L 0 630 Z"
        fill="url(#terrain)"/>

  <!-- Sun mark -->
  <circle cx="930" cy="180" r="60" fill="#fbbf24" opacity="0.85"/>
  <circle cx="930" cy="180" r="90" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.35"/>

  <!-- Wordmark -->
  <text x="80" y="225"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="124" font-weight="900" fill="#fafaf9" letter-spacing="-3">
    skoffroad
  </text>

  <!-- Orange underline -->
  <rect x="80" y="245" width="220" height="6" fill="#d97706"/>

  <!-- Tagline -->
  <text x="80" y="320"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="42" font-weight="600" fill="#e6e2d4">
    Physics off-road sim
  </text>
  <text x="80" y="370"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="42" font-weight="600" fill="#fbbf24">
    in your browser.
  </text>

  <!-- Sub -->
  <text x="80" y="425"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="22" fill="#a8a29e">
    Rust · Bevy · WebGPU · no download
  </text>

  <!-- URL pill -->
  <rect x="80" y="540" width="380" height="48" rx="24" fill="#d97706"/>
  <text x="270" y="572" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="22" font-weight="700" fill="#0c0a09">
    play.skoffroad.skworld.io
  </text>
</svg>
