name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Test (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bevy system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            pkg-config \
            libwayland-dev \
            libxkbcommon-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libfontconfig1-dev

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace

      - name: cargo test (drive_test)
        run: cargo test --test drive_test --release

  # ---------------------------------------------------------------------------
  # WASM build — produces the dist/ artifact that mobile-smoke tests against.
  # Only runs on pushes/PRs to main (mirrors the release.yml wasm job).
  # ---------------------------------------------------------------------------
  wasm-build:
    name: Build (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bevy system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            pkg-config \
            libwayland-dev \
            libxkbcommon-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libfontconfig1-dev

      - name: Install stable toolchain + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-ci

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Build WASM (release)
        run: trunk build --release

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-dist
          path: dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Mobile smoke test — boots the WASM build in headless Chromium with iPhone 14
  # emulation and verifies the mobile-start button flow works end-to-end.
  # ---------------------------------------------------------------------------
  mobile-smoke:
    name: Mobile smoke (Playwright / iPhone 14)
    needs: wasm-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/mobile/package.json

      - name: Download WASM dist artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: dist/

      - name: Install Playwright dependencies
        working-directory: tests/mobile
        run: npm install

      - name: Install Playwright Chromium browser
        working-directory: tests/mobile
        run: npx playwright install --with-deps chromium

      - name: Start static file server
        run: |
          npx http-server dist/ --port 8080 --cors &
          # Wait for the server to be ready before running tests.
          timeout 15 bash -c 'until curl -sf http://localhost:8080/ > /dev/null; do sleep 1; done'

      - name: Run Playwright mobile smoke tests
        working-directory: tests/mobile
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/mobile/playwright-report/
          retention-days: 7
